<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
  var l = window.location;

  var redirect = l.pathname.replace('/monitoring', '');

  window.location.replace(
    l.protocol + '//' + l.hostname +
    (l.port ? ':' + l.port : '') +
    '/monitoring/?redirect=' + redirect
  );
</script>
</head>
<body></body>
</html>
